name: ✅ Checks

on:
  pull_request:
    branches: ["main"]
    paths:
      - "python/agents/**"
      - "pyproject.toml"

permissions:
  contents: read
  pull-requests: write # Essential for posting the suggestion comments

jobs:
  ruff-format-suggestions:
    name: Ruff Format & Lint Suggestions
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: step-security/setup-uv@ccf0a26ce9117d9e99292b0ce953ea5d9ffe778e # v7.3.0
        with:
          python-version: "3.13"
    
      - name: Install Reviewdog
        uses: step-security/reviewdog-action-setup@34978e80c2c2b35bc0faf32a6dd993fd7dadc7ba # v1.4.0
        with:
          reviewdog_version: latest

      # We run Ruff via Reviewdog to generate the UI suggestions
      - name: Run Ruff and Post Suggestions
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Apply linting fixes and formatting to the local runner filesystem
          uvx ruff check --fix .
          uvx ruff format .

          # 2. Use git diff to see what changed, and pipe it to reviewdog
          # reviewdog -f=diff will turn git patches into GitHub suggestions
          git diff | reviewdog -f=diff \
                               -name="ruff-suggester" \
                               -reporter=github-pr-review \
                               -filter-mode=added \
                               -fail-on-error=true
